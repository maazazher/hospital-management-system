version: "3.8"

services:
  app:
    build: .
    container_name: hospital-app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - MONGODB_URI=mongodb://mongo:27017/hospital
    depends_on:
      - mongo
    networks:
      - hospital-network
    restart: unless-stopped

  mongo:
    image: mongo:6
    container_name: hospital-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - hospital-network
    restart: unless-stopped

volumes:
  mongo_data:
    driver: local

networks:
  hospital-network:
    driver: bridge
